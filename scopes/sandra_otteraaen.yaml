# Scope: Sandra Otteraaen — Team Treatment
# Notes are in Norwegian (may contain English terms). Do not translate.

pm_email: sandra.otteraaen@aidn.no
pm_name: Sandra Otteraaen
team: Team Treatment

description_no: |
  Sandra eier behandlingsdelen — særlig legemiddelhåndtering, kurve,
  administrering av medisiner, multidose, e-resept. Også tilknyttet prosedyrer
  og behandlingsplaner. Inkluderer istandgjøring, dobbeltkontroll, narkotikaregnskap,
  cave, legemiddelvarsling og integrasjoner mot Kjernejournal/Felleskatalogen.

includes:
  - Legemiddelkurve, medisinkurve
  - Medisinadministrering, doseringer
  - E-resept
  - Multidose
  - Behandlingsplaner
  - Prosedyrer knyttet til behandling
  - Istandgjøring av legemidler (dosett, multidose, pakning)
  - Dobbeltkontroll av legemidler
  - Narkotikaregnskap (hjemmetjeneste og institusjon)
  - Cave-registrering og legemiddelinteraksjoner
  - Legemiddelvarsling (interaksjoner, bivirkninger, risikolegemidler)
  - Legemiddelsamstemming (Kjernejournal, PLL)
  - Integrasjon mot Felleskatalogen
  - Legemiddelkabinett (Vingmed), medisinskap (VKP)
  - Lagerstyring / varelager for medisinrom
  - Apotek-integrasjon for lagerbestilling
  - Utdeling av legemidler (liste, filter, kvittering)
  - Legemiddelhistorikk og evalueringsdato
  - Dosett og behovsmedisin i dosett

excludes:
  - Saksbehandling knyttet til medisin-tjenester → Kristin (Case Handling)
  - Journalføring av behandling (sykepleie-notat) → Line (CPR)

