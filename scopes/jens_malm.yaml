  - KOSTRA-rapportering
  - Power BI / PowerBI
  - Egne rapporter, filtrer, ta ut rapport, tidsperiode
  - Dokumentasjon i rapport-kontekst

excludes:
  - Rapport i sykepleie-/vakt-kontekst  → Line (CPR)
  - Meldingsintegrasjoner               → Hanne (Messaging)

