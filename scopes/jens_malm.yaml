disambiguations:
  - term: rapport
    route_here_when:
      - kostra
      - statistikk
      - filtrer
      - ta ut
      - egne rapport
      - tidsperiode
      - dokumentasjon
      - klokkeslett
      - rapportering
      - powerbi
      - power bi
      - styringsinformasjon
      - aidn analytics
      - dashboard
      - ressurskrevende
      - sammenligning
  - term: faktura + arbeidsflyt
    route_here_always: true
    why: "Faktura i kombinasjon med arbeidsflyt er Back Office, ikke AI/Automation."
  - term: plassadministrasjon
    route_here_when:
      - belegg
      - rom
      - seng
      - institusjon
      - hdo
      - omsorgsbolig
      - fakturagrunnlag
      - overlappende opphold
    why: "Plassadministrasjon med økonomi/belegg-kontekst tilhører Back Office."
  - term: hjelpemidler
    route_here_when:
      - ks hjelpemidler
      - ks påkobla
      - hjelpemiddellager
      - integrasjon
      - nav hjelpemiddelsentral
    why: "Hjelpemiddelintegrasjon (KS Hjelpemidler) eies av Back Office."

hard_negatives:
  - "rapportskjema i sykepleie/vakt-kontekst → CPR/Line"
  - "plassadministrasjon uten økonomi/belegg-vinkel og med ren klinisk kontekst → vurder CPR"
