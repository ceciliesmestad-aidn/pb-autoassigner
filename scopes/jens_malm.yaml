# Scope: Jens Aga Malm — Team Back Office
# Notes are in Norwegian (may contain English terms). Do not translate.

pm_email: jens.malm@aidn.no
pm_name: Jens Aga Malm
team: Team Back Office

description_no: |
  Jens eier back-office: økonomi, faktura, arbeidsflyter for administrasjon,
  rapportering/analyse, KOSTRA, statistikk, styringsinformasjon, Power BI.
  Inkluderer også plassadministrasjon (sengeoversikt, rom, belegg, institusjon),
  egenbetaling/egenandel, hjelpemidler (KS Hjelpemidler-integrasjon),
  og økonomiintegrasjoner (Xledger, Helfo, NAV-trekklister).
  "Domene over teknologi": en rapport-sak tilhører her hvis den handler om
  analyse/styring, selv om teknologien er AI (f.eks. Aidn Analytics, KI-agent).

includes:
  - Faktura, fakturering, fakturaflyt, fakturagrunnlag, kreditering
  - Egenbetaling, egenandel, egenandelsgrunnlag, ligningstall, bofradrag, kurdøgnpris
  - Etteroppgjør, kontrolloppgjør, trekklister fra NAV
  - Arbeidsflyter for administrasjon (kombinert med faktura → Jens)
  - Rapportering, analyse, statistikk, styringsinformasjon
  - KOSTRA-rapportering, sammenligning mellom kommuner
  - Power BI / PowerBI, Aidn Analytics, dashboards, rapportbygger
  - Egne rapporter, filtrer, ta ut rapport, tidsperiode
  - Dokumentasjon i rapport-kontekst
  - Plassadministrasjon (rom, senger, belegg, institusjon, HDO, omsorgsboliger)
  - Hjelpemidler, KS Hjelpemidler, KS Påkobla, hjelpemiddellager
  - Økonomiintegrasjoner: Xledger, Helfo REST-API, KS Fiks API, NAV-integrasjon
  - Varsling ved endring i egenandelsgrunnlag / ligningstall
  - Ressurskrevende tjenestemottakere (rapportering og refusjon)
  - Pasientregnskap / lommepenger
  - Diettkoder og matombringing (der det danner grunnlag for fakturering)
  - Automatisk taksting til HELFO (fysioterapi)

excludes:
  - Rapport i sykepleie-/vakt-kontekst  → Line (CPR)
  - Meldingsintegrasjoner               → Hanne (Messaging)
  - Plassadministrasjon som ren klinisk/logistisk saksbehandling uten økonomi/belegg-kontekst → vurder CPR

