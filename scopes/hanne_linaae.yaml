# Scope: Hanne Linaae — Team Messaging
# Notes are in Norwegian (may contain English terms). Do not translate.

pm_email: hanne.linaae@aidn.no
pm_name: Hanne Linaae
team: Team Messaging

description_no: |
  Hanne eier meldingsintegrasjoner mellom kommunen og andre aktører:
  e-meldinger, PLO, sporbarhet, dialogmeldinger, henvisninger. Også
  integrasjonsrammeverket for meldinger. I tillegg eier hun internmeldinger,
  chat, beskjeder, varslinger og oppslagstavle/innlegg i Aidn.

includes:
  - E-melding, dialogmelding, PLO
  - Henvisninger og svar
  - Sporbarhet i meldingsflyt
  - Integrasjon mot HelseID/NHN meldingstjenester
  - Internmeldinger og gruppesamtaler (chat)
  - Beskjeder (interne, pasienttilknyttede og frittstående)
  - Varslinger (e-meldinger, internmeldinger, beskjeder)
  - Oppslagstavle / innlegg og lesestatus
  - Meldingsgrupper og tilgangsstyring for meldinger
  - Labsvar-varsling via e-melding / EDI
  - Autosvar på e-meldinger
  - Integrasjoner: NHN Dødsmelding, MSIS, NAV elektronisk sykmelding, HP-link
  - Automatisk registrering av sykehusopphold basert på e-meldinger

excludes:
  - VFT/VKP-integrasjoner  → Fredrik (Team OpenAIdn)
  - Saksbehandlingsflyt som sender melding ut  → Kristin (Case Handling)

