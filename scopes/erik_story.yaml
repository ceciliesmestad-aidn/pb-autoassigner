# Scope: Erik Story — Team AI & Automation
# Notes are in Norwegian (may contain English terms). Do not translate.
#
# History: until 2026-04-28 Erik also owned Team Patient (Mitt Aidn etc.).
# That half was handed off to Fredrik Pedersen — see scopes/fredrik_pedersen.yaml.
# This scope now covers ONLY AI features, voice/speech tooling and the
# automation engine. Patient-portal-only items are explicitly out.

pm_email: erik.story@aidn.no
pm_name: Erik Story
team: Team AI & Automation

description_no: |
  Erik eier AI- og automasjonsflatene: AI-funksjoner generelt
  (tale-til-tekst, tale-til-sammendrag, tale-til-skjema), talekommandoer,
  oversettelse, samt automasjonsplattformen og automatiseringsmotoren.
  Sykehusinnleggelses-arbeidsflyter ligger her fordi de driver
  automatiseringsmotoren — ikke fordi Erik eier sykehus-domenet.

includes:
  - AI-funksjoner generelt (tale-til-tekst, tale-til-sammendrag, tale-til-skjema)
  - Talekommandoer og navigering med stemme
  - Oversettelsesfunksjonalitet (tale og tekst)
  - Automatiseringsmotor (eksternt orientert)
  - Automasjonsplattform for lokal konfigurasjon av arbeidsflyter
  - Arbeidsflyter for sykehusinnleggelser (fordi de driver automasjonsmotoren)

excludes:
  - Mitt Aidn / pasientportal-funksjoner          → Fredrik (Team Patient)
  - Portal-kalender og avdelingskalender          → Fredrik (Team Patient)
  - Innbyggerdialog og selvbetjening              → Fredrik (Team Patient)
  - Helsenorge / KS DigiHelse-integrasjoner       → Fredrik (Team Patient)
  - Tale-til-tekst i kartlegging/saksbehandling   → Kristin (Case Handling)
  - Intern automation-feedback ("Manuell avslutning av flyt") → ekskluder
  - Faktura + arbeidsflyt                         → Jens (Back Office)

tag_routes:
  - "team ai"
  - "team automation"

keywords_strong:
  - ai-funksjon
  - ai-funksjoner
  - automatisering
  - automasjonsplattform
  - automasjonsmotor
  - automatiseringsmotor
  - tale-til-tekst
  - tale-til-sammendrag
  - tale-til-skjema
  - talekommandoer
  - taledokumentasjon
  - stemmestyring
  - oversettelse
  - sykehusinnleggelse

disambiguations:
  - "'Tale-til-tekst' i journal/kartleggingssammenheng → vurder Kristin (Case Handling) hvis kontekst er saksbehandling"
  - "AI-funksjon eksponert i Mitt Aidn (f.eks. tale i pasientportal) → fortsatt Erik når det handler om selve AI-funksjonen, IKKE Fredrik"
  - "'Automatisering av faktura/lønn' → Jens (Back Office), ikke Erik"

hard_negatives:
  - "manuell avslutning av flyt"  # intern feedback, ekskluder helt
