description_no: |
  Erik har to hatter: Team Patient (pasientens egne flater — Mitt Aidn,
  portal-kalender, pasient-portalen) og Team AI & Automation (AI-funksjoner,
  automatisering, tale-til-tekst som ikke er saksbehandling).

includes:
  - Mitt Aidn / MittAidn / "Mitt Aiden" (vanlig stavefeil) — pasientportal
  - Portal-kalender, timebestilling for pasient
  - Avdelingskalender, kalendersamarbeid internt
  - Pasient-selvbetjening
  - Samtykkeadministrasjon og pårørende-tilgang via Mitt Aidn
  - Innbyggerdialog og meldingsutveksling via Mitt Aidn
  - Digitale klager og søknader via Mitt Aidn
  - Innhenting av dokumenter/bilder fra innbygger via Mitt Aidn
  - Helsenorge-integrasjon (Mitt Aidn)
  - KS DigiHelse-integrasjon
  - Egne skjema til søkere i Mitt Aidn
  - Ruting av søknader/henvendelser i Mitt Aidn
  - AI-funksjoner generelt (tale-til-tekst, tale-til-sammendrag, tale-til-skjema)
  - Talekommandoer og navigering med stemme
  - Automatiseringsmotor (eksternt orientert)
  - Automasjonsplattform for lokal konfigurasjon av arbeidsflyter
  - Arbeidsflyter for sykehusinnleggelser
  - Oversettelsesfunksjonalitet (tale og tekst)
  - ExorLive-deling via innbyggerløsning (Mitt Aidn)
  - Gruppeaktiviteter / gruppetrening i kalender
  - Varsler og SMS-påminnelser til pasient ved avtaler
  - Mitt Aidn-app (mobiltilgang for pasient/pårørende)

excludes:
  - Tale-til-tekst i kartlegging/saksbehandling  → Kristin (Case Handling)
